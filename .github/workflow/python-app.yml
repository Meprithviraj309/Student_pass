name = student_pass


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  


job:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: 3.10
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: train_model
      run: |
        python src/train_model.py 
    - name: Test with pytest
      run: |
        pytest
      
    